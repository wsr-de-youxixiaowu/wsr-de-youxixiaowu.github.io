<!DOCTYPE html>

    <title>文件下载中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #0b0b0b, #1a1a1a);
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 36px 28px;
            backdrop-filter: blur(6px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
        }

        /* ===== 主程序 ===== */
        .main-file .filename {
            font-size: 20px;
            color: #fff;
            margin-bottom: 22px;
        }

        .main-file .btn {
            padding: 16px 0;
            font-size: 16px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.85);
            color: #000;
            font-weight: bold;
            border: none;
        }

        .main-file .btn:hover {
            background: #ffffff;
        }

        /* ===== 普通文件 ===== */
        .file-block {
            margin-top: 28px;
        }

        .filename {
            font-size: 14px;
            color: #888;
            margin-bottom: 14px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 11px 0;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #ccc;
            text-decoration: none;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.04);
            text-align: center;
            transition: all 0.25s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .info {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }

        .pwd {
            color: #ffd166;
        }

        @media (min-width: 480px) {
            .btn-group {
                flex-direction: row;
            }
            .btn {
                flex: 1;
            }
        }
    </style>
</head>
